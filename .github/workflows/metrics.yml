name: GitHub Metrics
on:
  schedule:
    - cron: "0 3,9,15,21 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Default metrics
        uses: ruribou/portfolio-metrics@v1
        with:
          # upstream lowlighter/metrics is archived; use the maintained fork
          filename: output/metrics.base.svg
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          base: header, repositories, activity

      - name: Most used (with details)
        uses: ruribou/portfolio-metrics@v1
        with:
          # Pulls the pre-built image from this fork's GHCR (published by build-docker.yml); no per-run rebuild
          filename: output/details.svg
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          base: "" 
          repositories_skipped: chatbot-ui, gitHub-readme-stats-clone, PL0-compiler
          plugin_languages: yes
          plugin_languages_ignored: >-
            html, css, tex, less, dockerfile, makefile, qmake, lex, cmake, shell,
            gnuplot, tsx
          plugin_languages_details: percentage
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          plugin_languages_limit: 8

      - name: Compact display
        uses: ruribou/portfolio-metrics@v1
        with:
          # Use the fork: upstream lowlighter/metrics is archived and its
          # achievements query still requests the sunset Projects classic API,
          # which hard-errors the whole query. The fork drops that field.
          filename: output/achievements.svg
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: B

      - name: Coding habits
        uses: ruribou/portfolio-metrics@v1
        with:
          # Pulls the pre-built image from this fork's GHCR (published by build-docker.yml); no per-run rebuild
          filename: output/habits.svg
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          base: ""
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic
